[package]
name = "leankg"
version = "0.1.0"
edition = "2021"

[dependencies]
cozo = "0.2"
tree-sitter = "0.25"
tree-sitter-go = "0.25"
tree-sitter-typescript = "0.23"
tree-sitter-python = "0.25"
tree-sitter-rust = "0.24"
clap = { version = "4", features = ["derive"] }
notify = "7"
axum = "0.7"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = "0.3"
walkdir = "2"
glob = "0.3"
tokio-tungstenite = "0.25"
futures-util = "0.3"
axum-core = "0.4"
headers = "0.4"
sha2 = "0.10"
pulldown-cmark = "0.12"
regex = "1"
parking_lot = "0.12"

[dev-dependencies]
tempfile = "3"
