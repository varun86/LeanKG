name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0, v0.0.1

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Build binaries
        run: |
          cargo build --release
          mkdir -p release
          cp target/release/leankg release/leanKG-linux-x64
          tar -czf release/leanKG-linux-x64.tar.gz -C release leanKG-linux-x64
          rm release/leanKG-linux-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/leanKG-linux-x64.tar.gz
